<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSpark AI | Student & Creator Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .tab-active { border-bottom: 2px solid #6366f1; color: #818cf8; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="gradient-bg min-h-screen text-gray-100 font-sans">
    <div class="max-w-3xl mx-auto px-4 py-12">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-indigo-400 tracking-tight">SkillSpark AI</h1>
            <p class="text-gray-400 mt-2">The Pakistani Student & Creator Toolkit</p>
        </header>

        <div class="flex justify-center space-x-6 mb-8 border-b border-gray-700">
            <button id="tab1" onclick="switchTab(1)" class="pb-2 px-4 tab-active font-semibold transition">Student Refiner</button>
            <button id="tab2" onclick="switchTab(2)" class="pb-2 px-4 text-gray-400 hover:text-indigo-300 font-semibold transition">Shorts Generator</button>
        </div>

        <!-- Tool 1: Student Refiner -->
        <div id="content1" class="bg-gray-800/50 p-6 rounded-2xl shadow-xl border border-gray-700 backdrop-blur-sm">
            <label class="block text-sm font-medium mb-3 text-indigo-300 uppercase tracking-wider">Your Homework Question:</label>
            <textarea id="studentInput" rows="4" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-indigo-500 outline-none placeholder-gray-600" placeholder="e.g. Explain Ferradays Laws for MDCAT..."></textarea>
            <button onclick="refineStudentPrompt()" class="mt-5 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">Generate Expert Prompt ✨</button>
            <div id="studentResultArea" class="hidden mt-8 animate-fade-in">
                <p class="text-xs text-gray-500 mb-2 uppercase font-bold">Copy this to ChatGPT/Gemini:</p>
                <div id="studentOutput" class="bg-black/40 p-5 rounded-xl text-green-400 text-sm font-mono border border-green-900/20 leading-relaxed"></div>
                <button onclick="copyText('studentOutput')" class="mt-3 text-sm text-indigo-400 hover:text-indigo-300 flex items-center">Copy to Clipboard 📋</button>
            </div>
        </div>

        <!-- Tool 2: Shorts Generator -->
        <div id="content2" class="hidden bg-gray-800/50 p-6 rounded-2xl shadow-xl border border-gray-700 backdrop-blur-sm">
            <label class="block text-sm font-medium mb-3 text-indigo-300 uppercase tracking-wider">Video Topic:</label>
            <textarea id="creatorInput" rows="4" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-indigo-500 outline-none placeholder-gray-600" placeholder="e.g. History of Lahore..."></textarea>
            <button onclick="generateShortsData()" class="mt-5 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">Make Viral Captions 🚀</button>
            <div id="creatorResultArea" class="hidden mt-8 space-y-4">
                <div class="bg-black/40 p-5 rounded-xl border border-indigo-900/20">
                    <p class="text-xs text-indigo-400 font-bold mb-2 uppercase">Viral Titles:</p>
                    <div id="creatorTitles" class="text-sm italic text-gray-100"></div>
                </div>
                <div class="bg-black/40 p-5 rounded-xl border border-indigo-900/20">
                    <p class="text-xs text-indigo-400 font-bold mb-2 uppercase">Description & Tags:</p>
                    <div id="creatorDesc" class="text-sm text-gray-300 leading-relaxed"></div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center text-gray-600 text-xs tracking-widest uppercase">
            © 2026 SkillSpark AI • Built for Students
        </footer>
    </div>

    <script>
        function switchTab(t) {
            document.getElementById('content1').classList.toggle('hidden', t!==1);
            document.getElementById('content2').classList.toggle('hidden', t!==2);
            document.getElementById('tab1').className = t===1 ? 'pb-2 px-4 tab-active font-semibold' : 'pb-2 px-4 text-gray-400 font-semibold';
            document.getElementById('tab2').className = t===2 ? 'pb-2 px-4 tab-active font-semibold' : 'pb-2 px-4 text-gray-400 font-semibold';
        }

        const corrections = { 
            "ferraday": "Faraday", 
            "electromag": "Electromagnetism", 
            "pakistan": "Pakistan", 
            "mdcat": "MDCAT", 
            "ecat": "ECAT",
            "fbise": "Federal Board",
            "bise": "Punjab Board"
        };

        function refineStudentPrompt() {
            let val = document.getElementById('studentInput').value;
            if(!val) return;
            
            // Clean and Correct words
            let corrected = val.split(" ").map(w => {
                let cleanWord = w.toLowerCase().replace(/[^a-z]/g, "");
                return corrections[cleanWord] || w;
            }).join(" ");

            let ctx = "";
            if(val.toLowerCase().includes("mdcat")) ctx = "Focus on MDCAT conceptual patterns and UHS syllabus.";
            else if(val.toLowerCase().includes("fbise")) ctx = "Align with Federal Board (FBISE) National Curriculum standards.";
            else if(val.toLowerCase().includes("ecat")) ctx = "Focus on UET ECAT mathematical derivations and patterns.";

            const prompt = `Act as an expert academic tutor in Pakistan. Explain: "${corrected}"\n` +
                           `${ctx ? 'Context: ' + ctx + '\n' : ''}\n` +
                           `1. Concept Summary (Simple terms)\n2. 3 Key Exam Points\n3. One Real-world Example\n4. 2 MCQ 'Trick Questions' for practice.`;
            
            document.getElementById('studentOutput').innerText = prompt;
            document.getElementById('studentResultArea').classList.remove('hidden');
        }

        function generateShortsData() {
            let val = document.getElementById('creatorInput').value;
            if(!val) return;
            document.getElementById('creatorTitles').innerText = `1. The ${val} Secret You Didn't Know!\n2. Why ${val} is easier than you think 😱\n3. Top trick for ${val} exams!`;
            document.getElementById('creatorDesc').innerText = `Master ${val} fast with these expert tips! \n\n#Shorts #Pakistan #Exams #Education #StudyTips`;
            document.getElementById('creatorResultArea').classList.remove('hidden');
        }

        function copyText(id) {
            const el = document.getElementById(id);
            const range = document.createRange();
            range.selectNode(el);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand("copy");
            window.getSelection().removeAllRanges();
            alert("Prompt Copied!");
        }
    </script>
</body>
</html>
